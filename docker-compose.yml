version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: simta-backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - DB_HOST=127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:3535,http://localhost:3536,https://simta.cerdas.club,https://api-simta.cerdas.club
    volumes:
      - ./backend/uploads:/app/uploads:Z

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: simta-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
